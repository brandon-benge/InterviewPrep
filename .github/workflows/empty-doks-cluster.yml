name: Empty DigitalOcean Kubernetes Cluster

on:
  schedule:
    - cron: "7 21 * * *" # 21:07 UTC; adjust if you want a different UTC time
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  empty-cluster:
    runs-on: ubuntu-latest
    env:
      KEEP_NAMESPACES_REGEX: '^(default|kube-system|kube-public|kube-node-lease|do-system|ingress-nginx|cert-manager)$'
      PV_CLEANUP_FILE: /tmp/pv-cleanup.tsv

    steps:

      - name: Install doctl and kubectl
        run: |
          set -euo pipefail

          DOCTL_VERSION="1.153.0"
          curl -fsSL "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" -o /tmp/doctl.tar.gz
          tar -xzf /tmp/doctl.tar.gz -C /tmp
          sudo mv /tmp/doctl /usr/local/bin/doctl
          doctl version

          KUBECTL_VERSION="v1.34.6"
          curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o /tmp/kubectl
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Fetch kubeconfig
        env:
          CLUSTER_NAME: k8s-1-35-1-do-1-tor1-1774447535918
        run: |
          set -euo pipefail
          doctl auth init -t "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}"
          doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"

      - name: Snapshot PVC, PV, and DO volume mappings
        run: |
          set -euo pipefail

          : > "$PV_CLEANUP_FILE"

          kubectl get pvc -A -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.spec.volumeName}{"\n"}{end}' \
          | while IFS=$'\t' read -r ns pvc pv; do
              [ -z "$pv" ] && continue
              if printf '%s\n' "$ns" | grep -Eq "$KEEP_NAMESPACES_REGEX"; then
                continue
              fi

              volume_handle="$(kubectl get pv "$pv" -o jsonpath='{.spec.csi.volumeHandle}' 2>/dev/null || true)"
              printf '%s\t%s\t%s\t%s\n' "$ns" "$pvc" "$pv" "$volume_handle" >> "$PV_CLEANUP_FILE"
            done

          kubectl get pvc -n default -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.spec.volumeName}{"\n"}{end}' \
          | while IFS=$'\t' read -r ns pvc pv; do
              [ -z "$pv" ] && continue

              volume_handle="$(kubectl get pv "$pv" -o jsonpath='{.spec.csi.volumeHandle}' 2>/dev/null || true)"
              printf '%s\t%s\t%s\t%s\n' "$ns" "$pvc" "$pv" "$volume_handle" >> "$PV_CLEANUP_FILE"
            done

          sort -u "$PV_CLEANUP_FILE" -o "$PV_CLEANUP_FILE"
          echo "Recorded $(wc -l < "$PV_CLEANUP_FILE" | tr -d ' ') PVC/PV mappings for final cleanup."

      - name: Delete all non-system namespaces
        run: |
          set -euo pipefail

          mapfile -t namespaces < <(
            kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
            | grep -Ev "$KEEP_NAMESPACES_REGEX" || true
          )

          if [ "${#namespaces[@]}" -eq 0 ]; then
            echo "No non-system namespaces found."
          else
            printf 'Deleting namespaces:\n%s\n' "${namespaces[@]}"
            for ns in "${namespaces[@]}"; do
              kubectl delete namespace "$ns" --ignore-not-found=true
            done

            for ns in "${namespaces[@]}"; do
              echo "Waiting for namespace $ns to terminate..."
              kubectl wait --for=delete namespace/"$ns" --timeout=15m || true
            done
          fi

      - name: Delete resources from default namespace
        run: |
          set -euo pipefail
          kubectl delete all --all -n default --ignore-not-found=true
          kubectl delete pvc --all -n default --ignore-not-found=true
          kubectl delete configmap --all -n default --ignore-not-found=true
          kubectl delete secret --all -n default --ignore-not-found=true
          kubectl delete ingress --all -n default --ignore-not-found=true
          kubectl delete job --all -n default --ignore-not-found=true
          kubectl delete cronjob --all -n default --ignore-not-found=true

      - name: Delete released or available PVs
        run: |
          set -euo pipefail
          kubectl get pv --no-headers 2>/dev/null | awk '$5=="Released" || $5=="Available" {print $1}' | while read -r pv; do
            [ -n "$pv" ] && kubectl delete pv "$pv" --ignore-not-found=true
          done

      - name: Force cleanup PVCs, PVs, and DigitalOcean volumes
        run: |
          set -euo pipefail

          if [ ! -s "$PV_CLEANUP_FILE" ]; then
            echo "No PVC/PV mappings were recorded for final cleanup."
            exit 0
          fi

          while IFS=$'\t' read -r ns pvc pv volume_handle; do
            [ -z "$pv" ] && continue

            echo "Cleaning namespace=${ns} pvc=${pvc} pv=${pv} volume=${volume_handle:-<none>}"

            kubectl delete pvc "$pvc" -n "$ns" --ignore-not-found=true || true
            kubectl delete pv "$pv" --grace-period=0 --force --ignore-not-found=true || true

            if [ -n "$volume_handle" ]; then
              doctl compute volume delete "$volume_handle" --force || true
            fi
          done < "$PV_CLEANUP_FILE"
